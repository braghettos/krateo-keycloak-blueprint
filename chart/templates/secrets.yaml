{{- if .Values.db.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.db.secret.name }}
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.db.secret.usernameKey }}: {{ .Values.db.secret.username | quote }}
  {{ .Values.db.secret.passwordKey }}: {{ .Values.db.secret.password | quote }}
{{- end }}
{{- if and .Values.bootstrapAdmin.enabled .Values.bootstrapAdmin.secret.create }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.bootstrapAdmin.secret.name }}
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
type: Opaque
stringData:
  username: {{ .Values.bootstrapAdmin.secret.username | quote }}
  password: {{ .Values.bootstrapAdmin.secret.password | quote }}
{{- end }}
