# Sample Krateo Composition that instantiates the Keycloak blueprint.
# Apply after the CompositionDefinition (compositiondefinition.yaml) is registered.
apiVersion: composition.krateo.io/v1alpha1
kind: Keycloak
metadata:
  name: keycloak
  namespace: keycloak-system
spec:
  keycloak:
    name: keycloak
    instances: 1
    hostname: "keycloak.example.com"
    http:
      httpEnabled: true
    ingress:
      enabled: true
    proxyHeaders: "xforwarded"
  db:
    vendor: postgres
    database: keycloak
    provider: cloudnativepg    # CNPG provisions the Postgres Cluster + credentials
    cloudnativepg:
      clusterName: keycloak-db
      instances: 1             # >=3 for HA
      owner: keycloak
      storage:
        size: 1Gi
    # For an existing DB instead, set provider: external and uncomment:
    # host: my-postgres
    # secret:
    #   create: false
    #   name: keycloak-db
    #   usernameKey: username
    #   passwordKey: password
  bootstrapAdmin:
    enabled: true
    secret:
      create: false
      name: keycloak-bootstrap-admin
